services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: taller_mecanico
      POSTGRES_USER: taller_user
      POSTGRES_PASSWORD: taller_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taller_user -d taller_mecanico"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      DATABASE_URL: postgres://taller_user:taller_pass_2026@db:5432/taller_mecanico
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "python setup.py &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "npm run dev"

volumes:
  pgdata:
